version: v1alpha1
metadata:
  name: frr
  version: v1.0.15
  author: Kai Zhang (kimi.zhangkai@gmail.com), Jonathan Senecal (contact@jonathansenecal.com)
  description: |
    This system extension provides FRR BGP routing on the host with Cilium integration.
    v1.0.15: Redistribute kernel routes - Cilium installs routes, FRR advertises them via BGP.
    No BGP peering between Cilium and FRR needed. Configuration-only approach with network announcement filtering per peer.
  compatibility:
    talos:
      version: ">= v1.5.0"
